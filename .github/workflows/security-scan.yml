name: security-scan

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: x402/package-lock.json

      - name: Install
        run: npm --prefix x402 ci

      - name: Secret and path scan
        run: ./scripts/ci/secret-scan.sh
