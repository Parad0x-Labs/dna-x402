name: mainnet-readiness

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            x402/package-lock.json
            site-agent/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install x402
        run: npm --prefix x402 ci

      - name: Install site-agent
        run: npm --prefix site-agent ci

      - name: Build x402
        run: npm --prefix x402 run build

      - name: Test x402
        run: npm --prefix x402 test

      - name: Audit x402 production dependencies
        run: npm --prefix x402 audit --omit dev --audit-level=high

      - name: Audit x402 full dependency tree
        run: npm --prefix x402 audit --audit-level=high

      - name: Secret and path scan
        run: npm --prefix x402 run security:scan

      - name: Build site-agent
        run: npm --prefix site-agent run build

      - name: Audit site-agent production dependencies
        run: npm --prefix site-agent audit --omit dev --audit-level=high

      - name: Audit site-agent full dependency tree
        run: npm --prefix site-agent audit --audit-level=high

      - name: Install Playwright browser
        run: npm --prefix site-agent exec -- playwright install --with-deps chromium

      - name: Test site-agent
        run: npm --prefix site-agent test -- --reporter=line

  devnet-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: x402/package-lock.json

      - name: Install x402
        run: npm --prefix x402 ci

      - name: Build x402
        run: npm --prefix x402 run build

      - name: Start x402 server (file storage, netting enabled for CI)
        run: |
          export UNSAFE_UNVERIFIED_NETTING_ENABLED=1
          export PORT=8080
          node x402/dist/server.js &
          echo $! > /tmp/x402-server.pid

      - name: Wait for server health
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:8080/health && break
            echo "Waiting for server... ($i/20)"
            sleep 2
          done
          curl -sf http://localhost:8080/health || (echo "Server failed to start" && exit 1)

      - name: Run devnet smoke (netting mode, no keypair needed)
        run: npx tsx x402/scripts/audit/devnet-smoke.ts --base-url http://localhost:8080 --out-dir audit_out

      - name: Show smoke results
        if: always()
        run: cat audit_out/devnet_smoke.json 2>/dev/null || true

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: devnet-smoke-${{ github.sha }}
          path: audit_out/

  receipt-anchor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test receipt anchor program
        run: cargo test --manifest-path programs/receipt_anchor/Cargo.toml
