<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polymarket Phase 0 Browser Harness</title>
    <script type="module" src="/src/main.ts"></script>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101418;
        color: #f2f5f7;
      }

      body {
        margin: 0;
        padding: 32px;
      }

      main {
        max-width: 980px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      .panel {
        border: 1px solid #2c3842;
        border-radius: 8px;
        padding: 18px;
        margin: 16px 0;
        background: #151b21;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        border: 1px solid #5f7484;
        background: #22303a;
        color: #f2f5f7;
        border-radius: 8px;
        padding: 10px 14px;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      pre {
        overflow: auto;
        background: #090d11;
        border: 1px solid #2c3842;
        border-radius: 8px;
        padding: 14px;
        min-height: 180px;
      }

      .warn {
        color: #ffd166;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Polymarket Phase 0 Browser Harness</h1>
      <p class="warn">No production trading. No backend wallet signing. Use a fresh safe owner wallet.</p>
      <section class="panel">
        <div class="actions">
          <button id="connect">Connect EVM Wallet</button>
          <button id="derive" disabled>Derive Deposit Wallet</button>
          <button id="sign" disabled>Sign POLY_1271 No-Submit Order</button>
          <button id="deploy" disabled>Deploy Deposit Wallet</button>
        </div>
      </section>
      <section class="panel">
        <pre id="log"></pre>
      </section>
    </main>
  </body>
</html>
