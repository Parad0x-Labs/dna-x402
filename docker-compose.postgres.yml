services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: x402
      POSTGRES_PASSWORD: x402_local
      POSTGRES_DB: x402_local
    ports:
      - "5432:5432"
    volumes:
      - ./.runtime/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U x402 -d x402_local"]
      interval: 5s
      timeout: 5s
      retries: 20
