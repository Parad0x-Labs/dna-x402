<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Null Resolver</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      min-height: 240px;
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
    }

    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 16px;
      border-bottom: 1px solid #2a2a3e;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #00ff9d, #0084ff);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 16px;
      color: #000;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .header-text p {
      font-size: 11px;
      color: #666;
      margin-top: 1px;
    }

    .section {
      padding: 14px 16px;
      border-bottom: 1px solid #1a1a2e;
    }

    .section:last-child {
      border-bottom: none;
    }

    .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #555;
      margin-bottom: 6px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
    }

    .dot.active {
      background: #00ff9d;
      box-shadow: 0 0 6px #00ff9d88;
    }

    .dot.idle {
      background: #555;
    }

    #status-text {
      color: #aaa;
      font-size: 12px;
    }

    #current-domain {
      font-family: "Courier New", monospace;
      font-size: 13px;
      color: #00ff9d;
      word-break: break-all;
      margin-top: 4px;
      min-height: 18px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: opacity 0.15s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00ff9d, #0084ff);
      color: #000;
      width: 100%;
    }

    .advanced-toggle {
      background: none;
      border: none;
      color: #555;
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .advanced-toggle:hover {
      color: #888;
    }

    #advanced-panel {
      display: none;
      margin-top: 10px;
    }

    #advanced-panel.open {
      display: block;
    }

    .input-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    #rpc-input {
      flex: 1;
      background: #111;
      border: 1px solid #2a2a3e;
      border-radius: 4px;
      padding: 6px 8px;
      color: #ccc;
      font-size: 11px;
      font-family: "Courier New", monospace;
      outline: none;
    }

    #rpc-input:focus {
      border-color: #0084ff44;
    }

    #save-rpc {
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 4px;
      color: #aaa;
      font-size: 11px;
      padding: 6px 10px;
      cursor: pointer;
    }

    #save-rpc:hover {
      background: #2a2a3e;
    }

    #rpc-saved {
      font-size: 10px;
      color: #00ff9d;
      margin-top: 4px;
      min-height: 14px;
    }

    .footer {
      padding: 8px 16px;
      font-size: 10px;
      color: #333;
      text-align: center;
    }

    .footer a {
      color: #555;
      text-decoration: none;
    }

    .footer a:hover {
      color: #888;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">N</div>
    <div class="header-text">
      <h1>Null Resolver</h1>
      <p>Agent-native web on Solana</p>
    </div>
  </div>

  <div class="section">
    <div class="label">Current Tab</div>
    <div class="status-row">
      <div class="dot idle" id="status-dot"></div>
      <span id="status-text">Not a .null domain</span>
    </div>
    <div id="current-domain"></div>
  </div>

  <div class="section">
    <a href="https://parad0xlabs.com/null-register" target="_blank" class="btn btn-primary">
      Register your .null domain
    </a>
  </div>

  <div class="section">
    <button class="advanced-toggle" id="toggle-advanced">
      <span id="toggle-arrow">&#9654;</span> Advanced
    </button>
    <div id="advanced-panel">
      <div class="label" style="margin-top:0">Solana RPC URL</div>
      <div class="input-row">
        <input type="text" id="rpc-input" placeholder="https://solana-rpc.publicnode.com" />
        <button id="save-rpc">Save</button>
      </div>
      <div id="rpc-saved"></div>
    </div>
  </div>

  <div class="footer">
    Powered by <a href="https://parad0xlabs.com" target="_blank">Parad0x Labs</a>
    &middot;
    NULL token &middot; Solana
  </div>

  <script src="popup.js"></script>
</body>
</html>
