[package]
name    = "dark-batch-auditor"
version = "0.1.0"
edition = "2021"
description = "RISC Zero zkVM guest: proves no duplicate nullifiers, receipt DAG continuity, and cap compliance for a committed Dark Null batch. Requires rzup + Bonsol toolchain."

# This is a RISC Zero guest program skeleton.
# To build: rzup install && cargo risczero build
# To verify on Solana: submit via Bonsol execution request.

[[bin]]
name = "dark-batch-auditor"
path = "src/main.rs"

[dependencies]
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
sha2        = "0.10"
