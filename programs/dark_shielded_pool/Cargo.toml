[package]
name = "dark-shielded-pool-program"
version = "0.1.0"
edition = "2021"

[features]
no-entrypoint = []

[dependencies]
solana-program        = { workspace = true }
sha2                  = { workspace = true }
dark-shielded-verifier = { path = "../../crates/dark-shielded-verifier" }

[dev-dependencies]
