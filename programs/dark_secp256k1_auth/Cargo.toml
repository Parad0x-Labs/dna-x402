[package]
name = "dark-secp256k1-auth"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]

[features]
default = []
mainnet = []
audit-verified = []

[dependencies]
solana-program = { workspace = true }

[dev-dependencies]
solana-program-test = { workspace = true }
solana-sdk         = { workspace = true }
tokio              = { workspace = true }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(feature, values("custom-heap", "custom-panic", "mainnet", "audit-verified"))',
    'cfg(target_os, values("solana"))',
] }
