[package]
name = "dark-x402-access-gate"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]

[features]
default = []
# Devnet builds compile out the mainnet_ready fail-closed VK guard (single-party devnet
# ceremony). Mainnet omits this feature → guard active → rejects a non-trustless VK.
devnet = []

[dependencies]
solana-program    = { workspace = true }
dark-groth16-core = { path = "../../crates/dark-groth16-core" }

[dev-dependencies]
solana-program-test = { workspace = true }
solana-sdk          = { workspace = true }
tokio               = { workspace = true }
