[package]
name    = "swarm-capsule"
version = "0.1.0"
edition = "2021"
description = "Signed relayer capability capsule. Each swarm node carries its own cryptographic passport: repo commit, config hash, role bitmap, fee caps, custody denial flags."

[dependencies]
