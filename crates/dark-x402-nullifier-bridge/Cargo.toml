[package]
name = "dark-x402-nullifier-bridge"
version = "0.1.0"
edition = "2021"
description = "Bridges x402 HTTP payment receipts to Solana on-chain nullifier banks"

[dependencies]
dark-x402-core      = { path = "../dark-x402-core" }
dark-nullifier-banks = { path = "../../programs/dark_nullifier_banks", features = ["no-entrypoint"] }
sha2                = "0.11"
serde               = { version = "1", features = ["derive"] }
serde_json          = "1"
solana-program      = "=1.18.26"
