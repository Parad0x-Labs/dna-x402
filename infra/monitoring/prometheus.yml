global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: dna-x402-local
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8080
        labels:
          service: dna-x402
          environment: local-validation
