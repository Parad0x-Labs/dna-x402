<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDX Dark Protocol</title>
    <style>
        body {
            width: 380px;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            padding: 25px 20px 15px;
            position: relative;
            background: rgba(0, 255, 136, 0.05);
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(45deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(0, 255, 136, 0.3); }
            to { text-shadow: 0 0 30px rgba(0, 255, 136, 0.6), 0 0 40px rgba(0, 204, 255, 0.3); }
        }

        .subtitle {
            color: #00ccff;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .wallet-explanation {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin: 15px 20px;
            font-size: 12px;
            line-height: 1.4;
            color: #fff;
        }

        .wallet-explanation strong {
            color: #00ff88;
        }

        .wallet-status {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 136, 0.2);
            padding: 20px;
            border-radius: 12px;
            margin: 20px;
            position: relative;
            transition: all 0.3s ease;
        }

        .wallet-status:hover {
            border-color: rgba(0, 255, 136, 0.4);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            margin-right: 10px;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .dot.connected {
            background: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.8);
            animation: connectedPulse 1.5s ease-in-out infinite;
        }

        @keyframes connectedPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(0, 255, 136, 0.8); }
            50% { box-shadow: 0 0 25px rgba(0, 255, 136, 1), 0 0 35px rgba(0, 204, 255, 0.5); }
        }

        .balance {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(45deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin: 0;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 0 20px 20px;
        }

        .btn {
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(45deg, #00ff88, #00ccff);
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(45deg, #00dd77, #00aaff);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(0, 255, 136, 0.3);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(0, 255, 136, 0.1);
            border-color: rgba(0, 255, 136, 0.6);
            color: #00ff88;
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .transfer-form {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 136, 0.2);
            padding: 20px;
            border-radius: 12px;
            margin: 20px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #ccc;
        }

        .form-input {
            width: 100%;
            padding: 8px;
            background: #333;
            border: 1px solid #444;
            border-radius: 4px;
            color: #fff;
            font-family: monospace;
            font-size: 12px;
        }

        .form-input:focus {
            outline: none;
            border-color: #00ff88;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🕵️ PDX DARK</div>
        <div class="subtitle">Zero-Knowledge Privacy Protocol</div>
        <div class="wallet-explanation">
            <strong>🔗 Connect Your Wallet:</strong> PDX Dark works with your existing Solana wallet (Phantom, Solflare, etc.) to send privacy-protected transfers. Your funds stay in your wallet - we just add privacy!
        </div>
    </div>

    <div class="wallet-status">
        <div class="status-indicator">
            <div class="dot" id="walletStatus"></div>
            <span id="walletText">Wallet not connected</span>
        </div>
        <div class="balance" id="balance">0 SOL</div>
    </div>

    <div class="actions">
        <button class="btn btn-primary" id="connectWallet">🔌 Connect Wallet</button>
        <button class="btn btn-secondary" id="depositNull">💰 Deposit $NULL</button>
        <button class="btn btn-primary" id="sendPrivate">🕵️ Send Private Transfer</button>
        <button class="btn btn-secondary" id="claimFaucet">🎁 Claim $NULL Faucet</button>
        <button class="btn btn-secondary" id="generateWallet">🎲 Generate New Wallet</button>
    </div>

    <div class="transfer-form hidden" id="transferForm">
        <div class="form-group">
            <label class="form-label">Recipient Address</label>
            <input type="text" class="form-input" id="recipient" placeholder="Solana address">
        </div>
        <div class="form-group">
            <label class="form-label">Amount (SOL)</label>
            <input type="number" class="form-input" id="amount" placeholder="0.1" step="0.01">
        </div>
        <div class="form-group">
            <label class="form-label">Memo (optional)</label>
            <input type="text" class="form-input" id="memo" placeholder="Private message">
        </div>
        <button class="btn btn-primary" id="executeTransfer">Execute Transfer</button>
        <button class="btn btn-secondary" id="cancelTransfer">Cancel</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
