    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https:;
      connect-src 'self' https://api.mainnet-beta.solana.com https://api.devnet.solana.com wss://api.mainnet-beta.solana.com wss://api.devnet.solana.com;
      frame-src 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    ">

    <!-- Additional Security -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <meta name="description" content="EXPERIMENTAL privacy transfer tool for Solana. NOT a full wallet. Use only for single transfers, then disconnect immediately." />
    <meta name="keywords" content="solana, privacy, transfer, experimental, tool" />
    <meta name="robots" content="noindex, nofollow" />
  </head>
